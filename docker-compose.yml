services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: spsm
      POSTGRES_PASSWORD: spsm_dev_change_me
      POSTGRES_DB: spsm
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    # No host port — avoids conflict with local Postgres on 5432.
    # API/collector reach db via Docker network. For host access, add: "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spsm -d spsm"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://spsm:spsm_dev_change_me@db:5432/spsm
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production-use-openssl-rand-hex-32}
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  collector:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://spsm:spsm_dev_change_me@db:5432/spsm
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: python -m app.collector

  web:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0

volumes:
  pgdata:
