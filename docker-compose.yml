services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: spsm
      POSTGRES_PASSWORD: spsm_dev_change_me
      POSTGRES_DB: spsm
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    # No host port — avoids conflict with local Postgres on 5432.
    # API/collector reach db via Docker network. For host access, add: "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spsm -d spsm"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    ports:
      - "8000:8000"
    # Use your router/LAN DNS so DHCP hostnames resolve (see LAN_DNS in .env.example).
    dns:
      - ${LAN_DNS:-192.168.0.1}
    environment:
      DATABASE_URL: postgresql+asyncpg://spsm:spsm_dev_change_me@db:5432/spsm
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production-use-openssl-rand-hex-32}
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000
      CORS_ALLOW_PRIVATE_NETWORKS: "true"
      PORTAL_PUBLIC_URL: ${PORTAL_PUBLIC_URL:-}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  collector:
    build: ./backend
    dns:
      - ${LAN_DNS:-192.168.0.1}
    environment:
      DATABASE_URL: postgresql+asyncpg://spsm:spsm_dev_change_me@db:5432/spsm
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: python -m app.collector

  web:
    build: ./frontend
    ports:
      - "5173:5173"
    # Leave VITE_API_URL unset so the browser uses same-origin /api (Vite proxy). Required for mobile LAN access.
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0

volumes:
  pgdata:
